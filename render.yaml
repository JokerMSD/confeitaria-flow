services:
  - type: web
    name: confeitaria-flow-api
    runtime: node
    rootDir: .
    buildCommand: npm install --include=dev && npm run build:api
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_USERS_JSON
        sync: false
